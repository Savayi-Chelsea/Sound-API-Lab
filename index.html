<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Savayi — Sound API Lab</title>
  <!-- External stylesheet — all visual styling lives in styles.css -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="player-wrap">

  <!-- Page heading -->
  <p class="label-top">▌ Savayi — Sound API Lab</p>

  <div class="player-card">

    <!-- FILE DROP ZONE
         The real <input type="file"> is invisible and overlaid on this box.
         The styled box acts as the visible face for the file picker. -->
    <div class="file-zone" id="fileZone">
      <input type="file" id="fileInput" accept="audio/*">
      <span class="icon">🎵</span>
      <p>Drop an audio file here or click to browse</p>
      <p class="file-hint">MP3 · WAV · OGG · FLAC · AAC</p>
    </div>

    <!-- TRACK INFO
         Hidden until a file is loaded; revealed by JS adding the .visible class -->
    <div class="track-info" id="trackInfo">
      <div class="track-header">
        <div class="track-header-left">
          <p class="track-name" id="trackName">—</p>
          <!-- Shows duration · format · file size once metadata is read -->
          <p class="track-meta" id="trackMeta">READY</p>
        </div>
        <!-- Clicking Remove resets the player back to the empty state -->
        <button class="remove-btn visible" id="removeBtn" title="Remove this audio file">
          <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
          Remove
        </button>
      </div>
    </div>

    <!-- FREQUENCY VISUALISER
         40 bar elements whose heights are driven by the Web Audio API AnalyserNode.
         Bars are injected by setupViz() in player.js; heights updated by drawViz(). -->
    <div class="viz-wrap" id="vizWrap"></div>

    <!-- SEEK BAR
         The fill width and thumb position are updated on every timeupdate event. -->
    <div class="seek-row" id="seekRow">
      <div class="seek-wrap" id="seekWrap">
        <div class="seek-fill"  id="seekFill"></div>
        <div class="seek-thumb" id="seekThumb"></div>
      </div>
      <div class="time-row">
        <span id="currentTime">0:00</span>
        <span id="duration">0:00</span>
      </div>
    </div>

    <!-- MAIN CONTROLS: skip back · play/pause · skip forward -->
    <div class="main-controls">

      <!-- Skip back 10 seconds (keyboard: J) -->
      <button class="ctrl-btn" id="skipBackBtn" title="Skip back 10s (J)" disabled>
        <svg viewBox="0 0 24 24">
          <path d="M11.99 5V1l-5 5 5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6h-2c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/>
          <text x="7" y="16" font-size="5.5" fill="currentColor" font-family="sans-serif" font-weight="bold">10</text>
        </svg>
      </button>

      <!-- Play / Pause — the SVG path is swapped by setPlayIcon() in player.js -->
      <button class="play-btn" id="playBtn" disabled>
        <svg viewBox="0 0 24 24">
          <path id="playIcon" d="M8 5v14l11-7z"/>
        </svg>
      </button>

      <!-- Skip forward 10 seconds (keyboard: L) -->
      <button class="ctrl-btn" id="skipFwdBtn" title="Skip forward 10s (L)" disabled>
        <svg viewBox="0 0 24 24">
          <path d="M12.01 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/>
          <text x="7" y="16" font-size="5.5" fill="currentColor" font-family="sans-serif" font-weight="bold">10</text>
        </svg>
      </button>

    </div>

    <hr class="sep">

    <!-- VOLUME + SPEED — displayed side by side in a 2-column grid -->
    <div class="secondary-controls">

      <!-- Volume: speaker icon acts as a mute toggle (keyboard: M) -->
      <div class="vol-row">
        <span class="vol-icon" id="muteIcon" title="Toggle mute (M)">
          <svg id="volSvg" viewBox="0 0 24 24">
            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
          </svg>
        </span>
        <input type="range" class="vol-slider" id="volSlider" min="0" max="100" value="80" step="1">
        <span class="vol-val" id="volVal">80%</span>
      </div>

      <!-- Playback speed selector -->
      <div class="speed-box">
        <span class="speed-label">SPEED</span>
        <div class="speed-btns">
          <button class="speed-btn"        data-speed="0.5">0.5×</button>
          <button class="speed-btn"        data-speed="0.75">0.75×</button>
          <button class="speed-btn active" data-speed="1">1×</button>
          <button class="speed-btn"        data-speed="1.5">1.5×</button>
          <button class="speed-btn"        data-speed="2">2×</button>
        </div>
      </div>

    </div>

    <!-- LOOP + MUTE TOGGLES -->
    <div class="extra-row">

      <!-- Loop toggle — adds .active class when looping is on (keyboard: R) -->
      <button class="tag-btn" id="loopBtn" title="Toggle loop (R)">
        <svg viewBox="0 0 24 24">
          <path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/>
        </svg>
        Loop
      </button>

      <!-- Mute toggle — mirrors the speaker icon in the volume row (keyboard: M) -->
      <button class="tag-btn" id="muteBtn" title="Mute (M)">
        <svg viewBox="0 0 24 24">
          <path id="muteBtnIcon" d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
        </svg>
        Mute
      </button>

    </div>

    <hr class="sep">

    <!-- KEYBOARD SHORTCUT REFERENCE -->
    <div class="kb-hints">
      <span class="kb-hint"><kbd>Space</kbd> Play/Pause</span>
      <span class="kb-hint"><kbd>J</kbd> −10s</span>
      <span class="kb-hint"><kbd>L</kbd> +10s</span>
      <span class="kb-hint"><kbd>M</kbd> Mute</span>
      <span class="kb-hint"><kbd>R</kbd> Loop</span>
      <span class="kb-hint"><kbd>↑↓</kbd> Volume</span>
    </div>

    <!-- STATUS BAR — updated by setStatus() in player.js -->
    <p id="statusMsg">— No file loaded —</p>

  </div>
</div>

<!-- Hidden audio element — the actual playback engine.
     The Web Audio API taps into this element via createMediaElementSource(). -->
<audio id="audio"></audio>

<!-- External script — all logic and Web Audio API usage lives in player.js -->
<script src="player.js"></script>

</body>
</html>
