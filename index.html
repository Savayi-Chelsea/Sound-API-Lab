<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waveplayer — Custom Audio Interface</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --surface2: #1e1e24;
    --surface3: #2a2a33;
    --accent: #c8f542;
    --accent-dim: rgba(200,245,66,0.15);
    --accent-dim2: rgba(200,245,66,0.08);
    --text: #f0f0ee;
    --text-muted: #888890;
    --text-dim: #555560;
    --danger: #ff5f5f;
    --radius: 14px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .player-wrap {
    width: 100%;
    max-width: 520px;
  }

  .label-top {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 1.5rem;
  }

  .player-card {
    background: var(--surface);
    border-radius: 20px;
    padding: 2rem;
    border: 1px solid #2a2a33;
  }

  /* FILE LOADER */
  .file-zone {
    border: 1.5px dashed var(--surface3);
    border-radius: var(--radius);
    padding: 1.5rem;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    margin-bottom: 1.5rem;
    position: relative;
  }
  .file-zone:hover, .file-zone.drag-over {
    border-color: var(--accent);
    background: var(--accent-dim2);
  }
  .file-zone input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .file-zone .icon {
    font-size: 28px;
    margin-bottom: 0.4rem;
    display: block;
  }
  .file-zone p {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
  }
  .file-zone .file-hint {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 0.3rem;
  }

  /* TRACK INFO */
  .track-info {
    margin-bottom: 1.5rem;
    display: none;
  }
  .track-info.visible { display: block; }
  .track-name {
    font-size: 17px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .track-meta {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 4px;
    letter-spacing: 0.08em;
  }

  /* VISUALIZER */
  .viz-wrap {
    background: var(--surface2);
    border-radius: var(--radius);
    height: 64px;
    margin-bottom: 1.25rem;
    display: flex;
    align-items: flex-end;
    padding: 0 6px 6px;
    gap: 2px;
    overflow: hidden;
    display: none;
  }
  .viz-wrap.visible { display: flex; }
  .viz-bar {
    flex: 1;
    background: var(--accent-dim);
    border-radius: 2px 2px 0 0;
    min-height: 4px;
    transition: height 0.08s ease, background 0.1s;
  }
  .viz-bar.active { background: var(--accent); }

  /* PROGRESS / SEEK */
  .seek-row {
    margin-bottom: 1.25rem;
    display: none;
  }
  .seek-row.visible { display: block; }
  .seek-wrap {
    position: relative;
    height: 5px;
    background: var(--surface3);
    border-radius: 99px;
    cursor: pointer;
    margin-bottom: 6px;
  }
  .seek-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    width: 0%;
    pointer-events: none;
    transition: width 0.1s linear;
  }
  .seek-thumb {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%) scale(0);
    width: 14px; height: 14px;
    background: var(--accent);
    border-radius: 50%;
    pointer-events: none;
    transition: transform 0.15s;
  }
  .seek-wrap:hover .seek-thumb { transform: translate(-50%, -50%) scale(1); }
  .time-row {
    display: flex;
    justify-content: space-between;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
  }
  #currentTime { color: var(--text-muted); }

  /* MAIN CONTROLS */
  .main-controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 1.5rem;
  }
  .ctrl-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-muted);
    padding: 8px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s, background 0.15s;
  }
  .ctrl-btn:hover { color: var(--text); background: var(--surface2); }
  .ctrl-btn.active { color: var(--accent); }
  .ctrl-btn svg { width: 20px; height: 20px; fill: currentColor; }

  .play-btn {
    width: 56px; height: 56px;
    background: var(--accent);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #0d0d0f;
    transition: transform 0.15s, background 0.15s;
    flex-shrink: 0;
  }
  .play-btn:hover { transform: scale(1.06); }
  .play-btn:active { transform: scale(0.96); }
  .play-btn svg { width: 22px; height: 22px; fill: currentColor; }
  .play-btn:disabled { background: var(--surface3); color: var(--text-dim); cursor: not-allowed; transform: none; }

  /* SECONDARY CONTROLS */
  .secondary-controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 1.5rem;
  }

  /* VOLUME */
  .vol-row {
    background: var(--surface2);
    border-radius: var(--radius);
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .vol-icon { cursor: pointer; flex-shrink: 0; color: var(--text-muted); transition: color 0.15s; }
  .vol-icon:hover { color: var(--accent); }
  .vol-icon svg { width: 18px; height: 18px; fill: currentColor; display: block; }
  input[type="range"].vol-slider {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 4px;
    border-radius: 99px;
    background: var(--surface3);
    outline: none;
    cursor: pointer;
  }
  input[type="range"].vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    transition: transform 0.1s;
  }
  input[type="range"].vol-slider::-webkit-slider-thumb:hover { transform: scale(1.2); }
  .vol-val {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    min-width: 28px;
    text-align: right;
  }

  /* SPEED */
  .speed-box {
    background: var(--surface2);
    border-radius: var(--radius);
    padding: 12px 14px;
  }
  .speed-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    margin-bottom: 8px;
    display: block;
  }
  .speed-btns {
    display: flex;
    gap: 5px;
  }
  .speed-btn {
    flex: 1;
    background: var(--surface3);
    border: 1px solid transparent;
    border-radius: 6px;
    color: var(--text-muted);
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    cursor: pointer;
    padding: 5px 2px;
    text-align: center;
    transition: all 0.15s;
  }
  .speed-btn:hover { color: var(--text); border-color: var(--surface3); }
  .speed-btn.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* SKIP + LOOP + MUTE row */
  .extra-row {
    display: flex;
    gap: 8px;
    margin-bottom: 1.5rem;
    justify-content: center;
  }
  .tag-btn {
    background: var(--surface2);
    border: 1px solid transparent;
    border-radius: 8px;
    color: var(--text-muted);
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    padding: 7px 14px;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.15s;
  }
  .tag-btn:hover { background: var(--surface3); color: var(--text); }
  .tag-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
  .tag-btn svg { width: 14px; height: 14px; fill: currentColor; }

  /* KEYBOARD HINT */
  .kb-hints {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .kb-hint {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--text-dim);
  }
  kbd {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    background: var(--surface2);
    border: 1px solid var(--surface3);
    border-radius: 4px;
    padding: 2px 5px;
    color: var(--text-dim);
  }

  /* STATUS */
  #statusMsg {
    font-size: 11px;
    color: var(--text-dim);
    text-align: center;
    margin-top: 1.25rem;
    min-height: 16px;
    font-family: 'Space Mono', monospace;
  }
  #statusMsg.ok { color: var(--accent); }
  #statusMsg.err { color: var(--danger); }

  /* Subtle separator */
  .sep { border: none; border-top: 1px solid var(--surface2); margin: 1.25rem 0; }
</style>
</head>
<body>

<div class="player-wrap">
  <p class="label-top">▌ Waveplayer — Custom Audio Interface</p>

  <div class="player-card">

    <!-- FILE LOADER -->
    <div class="file-zone" id="fileZone">
      <input type="file" id="fileInput" accept="audio/*">
      <span class="icon">🎵</span>
      <p>Drop an audio file here or click to browse</p>
      <p class="file-hint">MP3 · WAV · OGG · FLAC · AAC</p>
    </div>

    <!-- TRACK INFO -->
    <div class="track-info" id="trackInfo">
      <p class="track-name" id="trackName">—</p>
      <p class="track-meta" id="trackMeta">READY</p>
    </div>

    <!-- VISUALIZER -->
    <div class="viz-wrap" id="vizWrap"></div>

    <!-- SEEK BAR -->
    <div class="seek-row" id="seekRow">
      <div class="seek-wrap" id="seekWrap">
        <div class="seek-fill" id="seekFill"></div>
        <div class="seek-thumb" id="seekThumb"></div>
      </div>
      <div class="time-row">
        <span id="currentTime">0:00</span>
        <span id="duration">0:00</span>
      </div>
    </div>

    <!-- MAIN CONTROLS -->
    <div class="main-controls">
      <!-- Skip back 10s -->
      <button class="ctrl-btn" id="skipBackBtn" title="Skip back 10s (J)" disabled>
        <svg viewBox="0 0 24 24"><path d="M11.99 5V1l-5 5 5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6h-2c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/><text x="7" y="16" font-size="5.5" fill="currentColor" font-family="sans-serif" font-weight="bold">10</text></svg>
      </button>

      <!-- Play/Pause -->
      <button class="play-btn" id="playBtn" disabled>
        <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>

      <!-- Skip forward 10s -->
      <button class="ctrl-btn" id="skipFwdBtn" title="Skip forward 10s (L)" disabled>
        <svg viewBox="0 0 24 24"><path d="M12.01 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/><text x="7" y="16" font-size="5.5" fill="currentColor" font-family="sans-serif" font-weight="bold">10</text></svg>
      </button>
    </div>

    <hr class="sep">

    <!-- VOLUME + SPEED -->
    <div class="secondary-controls">
      <div class="vol-row">
        <span class="vol-icon" id="muteIcon" title="Toggle mute (M)">
          <svg id="volSvg" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
        </span>
        <input type="range" class="vol-slider" id="volSlider" min="0" max="100" value="80" step="1">
        <span class="vol-val" id="volVal">80%</span>
      </div>

      <div class="speed-box">
        <span class="speed-label">SPEED</span>
        <div class="speed-btns">
          <button class="speed-btn" data-speed="0.5">0.5×</button>
          <button class="speed-btn" data-speed="0.75">0.75×</button>
          <button class="speed-btn active" data-speed="1">1×</button>
          <button class="speed-btn" data-speed="1.5">1.5×</button>
          <button class="speed-btn" data-speed="2">2×</button>
        </div>
      </div>
    </div>

    <!-- LOOP + EXTRA CONTROLS -->
    <div class="extra-row">
      <button class="tag-btn" id="loopBtn" title="Toggle loop (R)">
        <svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
        Loop
      </button>
      <button class="tag-btn" id="muteBtn" title="Mute (M)">
        <svg id="muteBtnIcon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
        Mute
      </button>
    </div>

    <hr class="sep">

    <!-- KEYBOARD HINTS -->
    <div class="kb-hints">
      <span class="kb-hint"><kbd>Space</kbd> Play/Pause</span>
      <span class="kb-hint"><kbd>J</kbd> −10s</span>
      <span class="kb-hint"><kbd>L</kbd> +10s</span>
      <span class="kb-hint"><kbd>M</kbd> Mute</span>
      <span class="kb-hint"><kbd>R</kbd> Loop</span>
      <span class="kb-hint"><kbd>↑↓</kbd> Volume</span>
    </div>

    <p id="statusMsg">— No file loaded —</p>
  </div>
</div>

<audio id="audio"></audio>

<script>
const audio = document.getElementById('audio');
const fileInput = document.getElementById('fileInput');
const fileZone = document.getElementById('fileZone');
const playBtn = document.getElementById('playBtn');
const playIcon = document.getElementById('playIcon');
const skipBackBtn = document.getElementById('skipBackBtn');
const skipFwdBtn = document.getElementById('skipFwdBtn');
const volSlider = document.getElementById('volSlider');
const volVal = document.getElementById('volVal');
const volSvg = document.getElementById('volSvg');
const muteIcon = document.getElementById('muteIcon');
const muteBtn = document.getElementById('muteBtn');
const muteBtnIcon = document.getElementById('muteBtnIcon');
const loopBtn = document.getElementById('loopBtn');
const seekWrap = document.getElementById('seekWrap');
const seekFill = document.getElementById('seekFill');
const seekThumb = document.getElementById('seekThumb');
const seekRow = document.getElementById('seekRow');
const currentTimeEl = document.getElementById('currentTime');
const durationEl = document.getElementById('duration');
const trackInfo = document.getElementById('trackInfo');
const trackName = document.getElementById('trackName');
const trackMeta = document.getElementById('trackMeta');
const vizWrap = document.getElementById('vizWrap');
const statusMsg = document.getElementById('statusMsg');

let isMuted = false;
let prevVol = 0.8;
let isSeeking = false;
let animFrameId = null;
let audioCtx = null;
let analyser = null;
let source = null;
let vizBars = [];
let dataArray = null;
let fileLoaded = false;

// SVG PATHS
const PLAY_PATH = 'M8 5v14l11-7z';
const PAUSE_PATH = 'M6 19h4V5H6v14zm8-14v14h4V5h-4z';
const VOL_ON_PATH = 'M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM18.5 12c0 2.93-1.67 5.47-4.1 6.77l1.43 1.43C18.94 18.68 21 15.55 21 12s-2.06-6.68-5.17-8.2l-1.43 1.43C16.83 6.53 18.5 9.07 18.5 12z';
const VOL_OFF_PATH = 'M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z';

// FORMAT TIME
function fmtTime(s) {
  if (isNaN(s) || s < 0) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

// STATUS
function setStatus(msg, type = '') {
  statusMsg.textContent = msg;
  statusMsg.className = type;
}

// SETUP VISUALIZER BARS
function setupViz() {
  vizWrap.innerHTML = '';
  vizBars = [];
  const count = 40;
  for (let i = 0; i < count; i++) {
    const bar = document.createElement('div');
    bar.className = 'viz-bar';
    vizWrap.appendChild(bar);
    vizBars.push(bar);
  }
}

// AUDIO CONTEXT + ANALYSER
function initAudioContext() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 128;
  dataArray = new Uint8Array(analyser.frequencyBinCount);
  source = audioCtx.createMediaElementSource(audio);
  source.connect(analyser);
  analyser.connect(audioCtx.destination);
}

// DRAW VISUALIZER
function drawViz() {
  if (!analyser) return;
  animFrameId = requestAnimationFrame(drawViz);
  analyser.getByteFrequencyData(dataArray);
  const step = Math.floor(dataArray.length / vizBars.length);
  for (let i = 0; i < vizBars.length; i++) {
    const val = dataArray[i * step] || 0;
    const pct = Math.max(6, (val / 255) * 100);
    vizBars[i].style.height = pct + '%';
    vizBars[i].classList.toggle('active', val > 60);
  }
}

// LOAD FILE
function loadFile(file) {
  if (!file || !file.type.startsWith('audio/')) {
    setStatus('Invalid file — please choose an audio file', 'err');
    return;
  }
  const url = URL.createObjectURL(file);
  audio.src = url;
  audio.load();

  trackName.textContent = file.name.replace(/\.[^.]+$/, '');
  trackMeta.textContent = 'LOADING...';
  trackInfo.classList.add('visible');
  vizWrap.classList.add('visible');
  seekRow.classList.add('visible');
  fileZone.style.display = 'none';
  setupViz();

  audio.onloadedmetadata = () => {
    durationEl.textContent = fmtTime(audio.duration);
    const kb = (file.size / 1024).toFixed(0);
    trackMeta.textContent = `${fmtTime(audio.duration)}  ·  ${file.type.split('/')[1].toUpperCase()}  ·  ${kb} KB`;
    playBtn.disabled = false;
    skipBackBtn.disabled = false;
    skipFwdBtn.disabled = false;
    fileLoaded = true;
    setStatus('File loaded — press Space or click Play', 'ok');
  };

  audio.onerror = () => setStatus('Could not load audio file', 'err');
}

fileInput.addEventListener('change', e => loadFile(e.target.files[0]));

// DRAG AND DROP
fileZone.addEventListener('dragover', e => { e.preventDefault(); fileZone.classList.add('drag-over'); });
fileZone.addEventListener('dragleave', () => fileZone.classList.remove('drag-over'));
fileZone.addEventListener('drop', e => {
  e.preventDefault();
  fileZone.classList.remove('drag-over');
  loadFile(e.dataTransfer.files[0]);
});

// PLAY / PAUSE
playBtn.addEventListener('click', togglePlay);

function togglePlay() {
  if (!fileLoaded) return;
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  if (audio.paused) {
    initAudioContext();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    audio.play();
    playIcon.setAttribute('d', PAUSE_PATH);
    drawViz();
    setStatus('Playing');
  } else {
    audio.pause();
    playIcon.setAttribute('d', PLAY_PATH);
    cancelAnimationFrame(animFrameId);
    setStatus('Paused');
  }
}

audio.addEventListener('ended', () => {
  playIcon.setAttribute('d', PLAY_PATH);
  cancelAnimationFrame(animFrameId);
  if (!audio.loop) setStatus('Playback ended');
});

// SKIP
skipBackBtn.addEventListener('click', () => { audio.currentTime = Math.max(0, audio.currentTime - 10); setStatus('−10 seconds'); });
skipFwdBtn.addEventListener('click', () => { audio.currentTime = Math.min(audio.duration, audio.currentTime + 10); setStatus('+10 seconds'); });

// SEEK
seekWrap.addEventListener('click', e => {
  if (!fileLoaded) return;
  const rect = seekWrap.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  audio.currentTime = pct * audio.duration;
});

let dragging = false;
seekWrap.addEventListener('mousedown', () => { if (fileLoaded) dragging = true; });
document.addEventListener('mousemove', e => {
  if (!dragging) return;
  const rect = seekWrap.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  audio.currentTime = pct * audio.duration;
});
document.addEventListener('mouseup', () => { dragging = false; });

audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  seekFill.style.width = pct + '%';
  seekThumb.style.left = pct + '%';
  currentTimeEl.textContent = fmtTime(audio.currentTime);
});

// VOLUME
audio.volume = 0.8;
volSlider.addEventListener('input', () => {
  const v = volSlider.value / 100;
  audio.volume = v;
  volVal.textContent = volSlider.value + '%';
  isMuted = v === 0;
  updateVolIcon();
  if (!isMuted) prevVol = v;
});

function updateVolIcon() {
  const path = (isMuted || audio.volume === 0) ? VOL_OFF_PATH : VOL_ON_PATH;
  volSvg.querySelector('path').setAttribute('d', path);
  muteBtnIcon.setAttribute('d', path);
  muteBtn.classList.toggle('active', isMuted);
}

// MUTE
function toggleMute() {
  isMuted = !isMuted;
  if (isMuted) {
    prevVol = audio.volume;
    audio.volume = 0;
    volSlider.value = 0;
    volVal.textContent = '0%';
  } else {
    audio.volume = prevVol;
    volSlider.value = Math.round(prevVol * 100);
    volVal.textContent = Math.round(prevVol * 100) + '%';
  }
  updateVolIcon();
  setStatus(isMuted ? 'Muted' : 'Unmuted');
}

muteIcon.addEventListener('click', toggleMute);
muteBtn.addEventListener('click', toggleMute);

// LOOP
loopBtn.addEventListener('click', () => {
  audio.loop = !audio.loop;
  loopBtn.classList.toggle('active', audio.loop);
  setStatus(audio.loop ? 'Loop enabled' : 'Loop disabled');
});

// SPEED
document.querySelectorAll('.speed-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const sp = parseFloat(btn.dataset.speed);
    audio.playbackRate = sp;
    document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    setStatus(`Playback speed: ${sp}×`);
  });
});

// KEYBOARD CONTROLS
document.addEventListener('keydown', e => {
  if (['INPUT', 'TEXTAREA'].includes(e.target.tagName)) return;
  switch(e.key) {
    case ' ':
      e.preventDefault();
      if (fileLoaded) togglePlay();
      break;
    case 'j': case 'J':
      if (fileLoaded) { audio.currentTime = Math.max(0, audio.currentTime - 10); setStatus('−10 seconds'); }
      break;
    case 'l': case 'L':
      if (fileLoaded) { audio.currentTime = Math.min(audio.duration, audio.currentTime + 10); setStatus('+10 seconds'); }
      break;
    case 'm': case 'M':
      if (fileLoaded) toggleMute();
      break;
    case 'r': case 'R':
      if (fileLoaded) loopBtn.click();
      break;
    case 'ArrowUp':
      e.preventDefault();
      volSlider.value = Math.min(100, parseInt(volSlider.value) + 5);
      volSlider.dispatchEvent(new Event('input'));
      break;
    case 'ArrowDown':
      e.preventDefault();
      volSlider.value = Math.max(0, parseInt(volSlider.value) - 5);
      volSlider.dispatchEvent(new Event('input'));
      break;
  }
});
</script>
</body>
</html>
